name: Weather Bot

on:
  workflow_dispatch:

  schedule:
    - cron: "0 20 * * *"

jobs:
  weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TIDES_API_KEY: ${{ secrets.TIDES_API_KEY }}
        run: |
          python bot.py
